# Adaptive CI — generated by /harden-repo
# Cost-optimized: PR runs full validation, main runs lightweight release check,
# develop pushes trigger nothing.

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Secret scan — runs on all PRs ──────────────────────────
  secret-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: |
          set -euo pipefail
          DIFF_OUTPUT=$(git diff origin/${{ github.base_ref }}...HEAD -- ':!scripts/*' ':!docs/*' ':!*.md' ':!.claude/hooks/*' ':!.github/workflows/*' ':!tests/*' || true)
          if [ -z "$DIFF_OUTPUT" ]; then
            echo "No diffable content (docs/scripts only) — skipping"
            exit 0
          fi
          if echo "$DIFF_OUTPUT" | grep '^+' | grep -v '^+++' | grep -E "(sk-[a-zA-Z0-9_-]{20,}|AKIA[0-9A-Z]{16}|private_key|-----BEGIN.*PRIVATE KEY-----|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9_]{82}|xox[bsapr]-[a-zA-Z0-9-]+|password\s*[:=]\s*['\"][^'\"]{8,}|Bearer\s+[A-Za-z0-9._-]{20,}|(token|secret|api_key)\s*[:=]\s*[A-Za-z0-9+/=]{40,})"; then
            echo "::error::Potential secrets detected in diff"
            exit 1
          fi
          echo "No secrets detected"

  # ── Changelog gate — PRs to main only ──────────────────────
  changelog-check:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check changelog updated
        run: |
          if ! git diff origin/main...HEAD --name-only | grep -q 'CHANGELOG.md'; then
            echo "::error::CHANGELOG.md has no changes. Update the changelog before merging to main."
            exit 1
          fi

  # ── Python tests — runs on all PRs ───────────────────────────
  python-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install pytest and coverage
        run: pip install pytest pytest-cov
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=hooks --cov-report=term-missing --cov-fail-under=90

  # ── DB-pollution guard — blocks bare ensure_index() in tests (GH #46) ─
  no-default-db-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Assert every DB-opening call in tests/ passes db_path
        run: python3 scripts/ci-checks/no-default-db.py

  # ── Security tests — runs on all PRs ──────────────────────────
  security-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run security tests
        env:
          OB_HOOKS_DIR: hooks
        run: bash scripts/test-security.sh

  # ── Post-merge: release verification (main only, advisory) ─
  detect-release-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check if release/hotfix merge
        id: check
        run: |
          MERGE_MSG=$(git log -1 --format=%s HEAD)
          if echo "$MERGE_MSG" | grep -qE 'release/|hotfix/'; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            VERSION=$(echo "$MERGE_MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify GitHub Release exists (advisory)
        if: steps.check.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          if [ -n "$VERSION" ]; then
            gh release view "$VERSION" --json tagName || \
              echo "::warning::GitHub Release $VERSION not found. Was git-flow-finish.sh used?"
          fi
